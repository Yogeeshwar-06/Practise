<!DOCTYPE html>
<html>
<head>
<style>
table{
    border-collapse: collapse;
    width: 50%;
}
td{
    border:2px solid black;
    text-align:center;
    padding: 10px;
    
    
}



</style>
</head>

<body>

<table>

<tr>
<td style="background-color: yellow;">1</td>
<td style="background-color: yellow;" colspan="2">2</td>
<td style="background-color: yellow;" colspan="3">3</td>
</tr>

<tr>
<td  style="background-color: lightblue;"    rowspan="2" colspan="2">4</td>
<td  style="background-color: lightblue;" colspan="4">5</td>
</tr>

<tr>
<td   style="background-color: lightgreen;" colspan="3">6</td>
<td  style="background-color: lightgreen;" rowspan="3" >7</td>
</tr>

<tr>
<td  style="background-color: beige;" rowspan="5">8</td>
<td  style="background-color: beige;">9</td>
<td  style="background-color: beige;">10</td>
<td  style="background-color: beige;" rowspan="2">11</td>
</tr>

<tr>
<td style="background-color: brown;" colspan="2">12</td>
</tr>

<tr>
<td  style="background-color: pink;" rowspan="4">13</td>
<td   style="background-color: pink;" colspan="4">14</td>
</tr>

<tr>
<td colspan="3" style="background-color: chocolate;">15</td>
<td style="background-color: chocolate;">16</td>
</tr>

<tr> 
    <td colspan="4" style="background-color: gold;"> 17</td>
</tr>

</table>

</body>
</html>
