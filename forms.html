<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    Forms: A form is a section of a document that contains interactive controls that allow users to submit information to a web server. Forms are used to collect user input, such as text, selections, and files, and they can be used for a variety of purposes, such as registration, login, feedback, and search.
    ( or  )
      Used to collect the data from user and sends to the server (DB)
    Example:
    1. Registration form
    2. Login form
    3. Feedback form
    -->
    <h1> Application Form </h1>
    <form autocomplete="off">
      <label> First Name: </label>
      <input type="text" name="firstName">
      <label> Last Name: </label>
      <input type="text" name="lastName"><br><br>
      <label> Date of Birth: </label>
      <input type="date" name="dob">
      <label for="age ">Age: </label> 
    <input type="number" name="age" id="age" min="0"max="100" step="2">
    <br><br>
    <label for="gender" > Gender: </label>
    <select name="gender" id="gender">
        <option value=""> --Select--</option>
        <option value="male"> Male</option>
        <option value="female"> Female</option>

    </select>
    <label for="email"> Email Address:</label>
    <input type="email" name="email" id="email" placeholder="Enter Your Email">
    <br><br>
    <label> Positions Available:</label>
    <input type="radio" name="positions available " value="developer" id="developer">
    <label for="developer"> Developer</label>
    <input type="radio" name="positions available " value="mid-level" id="mid-level">
    <label for="mid-level"> Mid- level Developer</label>
    <input type="radio" name="positions available " value="senior" id="senior-dev">
    <label for="senior-dev">Senior Developer</label>
    <br><br>
    <label> Programming Languages: </label>
    <input type="checkbox" name="programminglanguage" id="java" value="java">
    <lable for="java"> Java</lable>
    <input type="checkbox" name="programminglanguage" id="java script" value="java script">
    <lable for="java script"> Java script</lable>
    <input type="checkbox" name="programminglanguage" id="python" value="python">
    <lable for="python"> Python</lable><br><br>
    <label>
        Password:
    </label>
    <input type="password" name="password" >
    <label> Confirm Password:</label>
    <input type="password" name="confirmPassword" >
    <br><br>
    <input type="submit" value="submit">
    <input type="reset" value="reset">
    </form>
</body>
</html>
