<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
            width: 50%;
            
        }
        th, td {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    

    <table>
        <tr>
            <th style="background-color: pink;">Logo</th>
            <th colspan="4" style="background-color: bisque;">Top Menu</th>
        </tr>
        <tr>
            <td rowspan="2" style="background-color: bisque;">Side menu</td>
            <td style="background-color: aquamarine;">World News</td><br>
           <td style="background-color: aquamarine;"> Financial news</td>
           
           <td rowspan="2" style="background-color: pink;"> list of ads</td>
        </tr>
        <tr>
            <td style="background-color: aquamarine;"> Technology</td>
            <td style="background-color: aquamarine;"> Sports</td>

        </tr>
        <tr>
            <td colspan="4"   style="background-color: cornflowerblue; text-align: center; color: white;">
                Footer
            </td>
        </tr>
    </table>
</body>
</html>
